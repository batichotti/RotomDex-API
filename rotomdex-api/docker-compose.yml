version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: rotomdex-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: rotomdex
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rotomdex-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rotomdex"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rotomdex-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: rotomdex
    ports:
      - "3001:3001"
    networks:
      - rotomdex-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:

networks:
  rotomdex-network:
    driver: bridge